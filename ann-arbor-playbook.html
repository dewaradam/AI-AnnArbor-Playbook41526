  .segment-box { margin-top: 12px; border-radius: 8px; padding: 12px; border: 1px solid color-mix(in srgb, var(--c) 25%, transparent); background: color-mix(in srgb, var(--c) 8%, transparent); }

  .contact-why { color: rgba(255,255,255,0.5); font-size: 12px; line-height: 1.6; }

  .script-box p { color: rgba(255,255,255,0.7); font-size: 13px; line-height: 1.85; font-style: italic; }

  .sms-why { color: rgba(255,255,255,0.4); font-size: 11px; font-style: italic; }

  .hook-card.open { border-color: color-mix(in srgb, var(--c) 40%, transparent); background: color-mix(in srgb, var(--c) 6%, transparent); }
  .hook-header { width: 100%; padding: 14px 18px; background: transparent; border: none; cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; }
  .hook-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 3px; }
  .hook-price { font-size: 11px; font-family: 'Courier New', monospace; color: var(--c); }
  .hook-toggle { color: rgba(255,255,255,0.3); font-size: 18px; }
  .hook-body { padding: 0 18px 18px; display: none; }
  .hook-body p { color: rgba(255,255,255,0.65); font-size: 13px; line-height: 1.75; }
  .hook-card.open .hook-body { display: block; }

  /* Footer */
  #footer { padding: 12px 28px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  #footer span { color: rgba(255,255,255,0.15); font-size: 10px; font-family: 'Courier New', monospace; }

  @media (max-width: 600px) {

let activeV = 0, activeB = 0, activeH = -1;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function setColor(color) {
  document.documentElement.style.setProperty('--c', color);
}

function render() {
  const v = verticals[activeV];
  const b = v.businesses[activeB];
  setColor(v.color);

  // Vertical tabs
  document.getElementById('vtabs').innerHTML = verticals.map((vt,i) =>
    `<button class="vtab${activeV===i?' active':''}" style="--c:${vt.color}" onclick="switchV(${i})">${vt.emoji} ${vt.label}</button>`
  ).join('');

  // Sidebar
  document.getElementById('sidebar').innerHTML =
    `<div class="sidebar-count">${v.businesses.length} TARGETS</div>` +
    v.businesses.map((bz,i) =>
      `<button class="biz-btn${activeB===i?' active':''}" style="--c:${v.color}" onclick="switchB(${i})">
        <div class="bname">${bz.name}</div>
        <div class="btag">${bz.tag}</div>
      </button>`
    ).join('') +
    `<div class="segment-box" style="--c:${v.color}">
      <div class="seg-label">VERTICAL HOOK</div>
      <p>${v.segment.pull}</p>
    </div>`;

  // Main
  document.getElementById('main').innerHTML = `
    <div style="margin-bottom:20px">
      <div class="biz-title-row">
        <h2 style="--c:${v.color}">${b.name}</h2>
        <span class="biz-tag-badge" style="--c:${v.color}">${b.tag}</span>
      </div>
      <p class="biz-overview">${b.overview}</p>
    </div>
    <div class="divider" style="--c:${v.color}"></div>

    <div style="margin-bottom:20px">
      <div class="section-label" style="--c:${v.color}">Why Their Data Is Gold</div>
      <div class="data-box" style="--c:${v.color}"><p>${b.dataProfile}</p></div>
    </div>

    <div style="margin-bottom:20px">
      <div class="section-label" style="--c:${v.color}">Who To Call</div>
      <div class="contacts-wrap">
        ${b.contacts.map(c => `
          <div class="contact-card">
            <div class="contact-top">
              <span class="contact-name">${c.name}</span>
              <span class="contact-title" style="color:${v.color}">${c.title}</span>
              <span class="contact-phone">${c.phone}</span>
            </div>
            <p class="contact-why">${c.why}</p>
          </div>`).join('')}
      </div>
    </div>

    <div style="margin-bottom:20px">
      <div class="section-label" style="--c:${v.color}">What To Say When They Pick Up</div>
      <div class="script-box" style="--c:${v.color}"><p>${b.callScript}</p></div>
    </div>

    <div style="margin-bottom:20px">
      <div class="section-label" style="--c:${v.color}">The SMS That Drives $5k+ Same Day</div>
      <div class="sms-box" style="--c:${v.color}">
        <div class="sms-label">SEND THIS LIVE IN THE ROOM</div>
        <p class="sms-text">${v.segment.message}</p>
        <p class="sms-why">💡 ${v.segment.why}</p>
      </div>
    </div>

    <div class="divider" style="--c:${v.color}"></div>

    <div class="section-label" style="--c:${v.color}">Pitch Options</div>
    ${b.hooks.map((h,i) => `
      <div class="hook-card${activeH===i?' open':''}" id="hook-${i}" style="--c:${v.color}">
        <button class="hook-header" onclick="toggleHook(${i})">
          <div>
            <div class="hook-name">${h.name}</div>
            <div class="hook-price" style="color:${v.color}">${h.pricing}</div>
          </div>
          <span class="hook-toggle">${activeH===i?'−':'+'}</span>
        </button>
        <div class="hook-body"><p>${h.detail}</p></div>
      </div>`).join('')}
  `;
}

function switchV(i) { activeV = i; activeB = 0; activeH = -1; render(); }
function switchB(i) { activeB = i; activeH = -1; render(); }
function toggleHook(i) { activeH = activeH === i ? -1 : i; render(); }

render();
</script>
